<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Video Comparison</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --md-surface: #fff;
      --md-outline: #dadce0;
      --md-on-surface: #202124;
      --md-on-surface-medium: #5f6368;
      --md-chip-heygen-bg: #e8f0fe;
      --md-chip-heygen-text: #1a73e8;
      --md-chip-kaltura-text: #137333;
      --md-chip-kaltura-bg: #e6f4ea;
      --md-shadow-1: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
      --md-shadow-2: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
      --md-radius: 12px;
    }

    body {
      background: #f1f3f4;
      color: var(--md-on-surface);
      font-family: "Roboto", "Google Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
    }

    h1 {
      font-family: "Google Sans", sans-serif;
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--md-on-surface);
      text-align: center;
      margin-bottom: 36px;
    }

    /* ── Grid ── */
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      max-width: 1440px;
    }

    /* ── Card ── */
    .video-card {
      background: var(--md-surface);
      border-radius: var(--md-radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--md-shadow-1);
      transition: box-shadow 0.2s;
    }

    .video-card:hover {
      box-shadow: var(--md-shadow-2);
    }

    .card-header {
      padding: 18px 22px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--md-outline);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .chip-heygen {
      background: var(--md-chip-heygen-bg);
      color: var(--md-chip-heygen-text);
    }

    .chip-kaltura {
      background: var(--md-chip-kaltura-bg);
      color: var(--md-chip-kaltura-text);
    }

    .card-title {
      font-family: "Google Sans", sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--md-on-surface);
    }

    /* ── Video ── */
    .video-wrapper video {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: #000;
    }

    /* ── VS divider (mobile only) ── */
    .vs-divider {
      display: none;
      align-items: center;
      justify-content: center;
    }

    .vs-divider-inner {
      background: var(--md-surface);
      border: 1px solid var(--md-outline);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--md-on-surface-medium);
      letter-spacing: 1px;
      box-shadow: var(--md-shadow-1);
    }

    @media (max-width: 820px) {
      h1 { font-size: 1.75rem; }

      .comparison-grid {
        grid-template-columns: 1fr;
      }

      .vs-divider {
        display: flex;
        height: 36px;
      }
    }
  </style>
</head>
<body>

  <h1>Avatar Video Comparison</h1>

  <div class="comparison-grid">

    <!-- HeyGen Card -->
    <div class="video-card">
      <div class="card-header">
        <span class="chip chip-heygen">HeyGen</span>
        <span class="card-title">Avatar IV</span>
      </div>
      <div class="video-wrapper">
        <video id="videoA" controls preload="metadata">
          <source src="HeyGen - Avatar IV.mp4" type="video/mp4" />
          Your browser does not support the video element.
        </video>
      </div>
    </div>

    <div class="vs-divider"><div class="vs-divider-inner">VS</div></div>

    <!-- Kaltura Card -->
    <div class="video-card">
      <div class="card-header">
        <span class="chip chip-kaltura">Kaltura</span>
        <span class="card-title">High Resolution</span>
      </div>
      <div class="video-wrapper">
        <video id="videoB" controls preload="metadata">
          <source src="Kaltura high res.mp4" type="video/mp4" />
          Your browser does not support the video element.
        </video>
      </div>
    </div>

  </div>

  <script>
    const videoA = document.getElementById('videoA');
    const videoB = document.getElementById('videoB');

    videoA.addEventListener('play', () => videoB.pause());
    videoB.addEventListener('play', () => videoA.pause());
  </script>

</body>
</html>
